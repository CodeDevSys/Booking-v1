<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wartelisten-Termin bestätigen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main class="app" id="waitlist-claim-app">
    <header class="header">
      <div class="logo">✂</div>
      <div>
        <h1>Freien Termin sichern</h1>
        <p class="subtitle">Nur ein Klick - wer zuerst bestätigt, bekommt den Slot.</p>
      </div>
    </header>

    <section class="card claim-card">
      <div id="waitlist-offer-container">
        <p class="loading">Angebot wird geladen…</p>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
